<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <!-- Mario Red Gradient -->
    <linearGradient id="marioGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E52521;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E52521;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong Glow -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Coin Spin Animation -->
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="2s" repeatCount="indefinite"/>
    
    <!-- Float Animation -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="3s" repeatCount="indefinite"/>
    
    <!-- Pulse Animation -->
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    
    <!-- Star Twinkle -->
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="#0a0a0a"/>
  
  <!-- Animated Stars Background -->
  <g opacity="0.6">
    <circle cx="100" cy="50" r="2" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="200" cy="100" r="1.5" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="350" cy="70" r="2.5" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="500" cy="120" r="1.8" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="700" cy="80" r="2.2" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="850" cy="140" r="1.6" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.7s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="1000" cy="60" r="2.3" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.3s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="1100" cy="110" r="1.9" fill="#FFD700">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
  </g>
  
  <!-- Animated Coins -->
  <g>
    <!-- Coin 1 -->
    <g transform="translate(80, 180)">
      <animateTransform attributeName="transform" type="translate" values="80,180; 80,170; 80,180" dur="2s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="20" fill="url(#goldGradient)" filter="url(#glow)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B4513">$</text>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Coin 2 -->
    <g transform="translate(1120, 200)">
      <animateTransform attributeName="transform" type="translate" values="1120,200; 1120,190; 1120,200" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <circle cx="0" cy="0" r="20" fill="url(#goldGradient)" filter="url(#glow)"/>
      <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#8B4513">$</text>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </g>
    
    <!-- Coin 3 -->
    <g transform="translate(150, 300)">
      <animateTransform attributeName="transform" type="translate" values="150,300; 150,290; 150,300" dur="1.8s" repeatCount="indefinite" begin="1s"/>
      <circle cx="0" cy="0" r="15" fill="url(#goldGradient)" filter="url(#glow)"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">$</text>
    </g>
    
    <!-- Coin 4 -->
    <g transform="translate(1050, 320)">
      <animateTransform attributeName="transform" type="translate" values="1050,320; 1050,310; 1050,320" dur="2.2s" repeatCount="indefinite" begin="0.8s"/>
      <circle cx="0" cy="0" r="15" fill="url(#goldGradient)" filter="url(#glow)"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">$</text>
    </g>
  </g>
  
  <!-- Mario Mushroom Icons -->
  <g>
    <!-- Mushroom 1 -->
    <g transform="translate(50, 280)">
      <animateTransform attributeName="transform" type="translate" values="50,280; 50,270; 50,280" dur="3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="-10" rx="25" ry="20" fill="#E52521"/>
      <circle cx="-10" cy="-15" r="5" fill="white"/>
      <circle cx="10" cy="-15" r="5" fill="white"/>
      <rect x="-15" y="0" width="30" height="20" rx="5" fill="#F5DEB3"/>
      <circle cx="-5" cy="8" r="2" fill="#000"/>
      <circle cx="5" cy="8" r="2" fill="#000"/>
    </g>
    
    <!-- Mushroom 2 -->
    <g transform="translate(1150, 280)">
      <animateTransform attributeName="transform" type="translate" values="1150,280; 1150,270; 1150,280" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <ellipse cx="0" cy="-10" rx="25" ry="20" fill="#E52521"/>
      <circle cx="-10" cy="-15" r="5" fill="white"/>
      <circle cx="10" cy="-15" r="5" fill="white"/>
      <rect x="-15" y="0" width="30" height="20" rx="5" fill="#F5DEB3"/>
      <circle cx="-5" cy="8" r="2" fill="#000"/>
      <circle cx="5" cy="8" r="2" fill="#000"/>
    </g>
  </g>
  
  <!-- Main Text with Glow -->
  <g filter="url(#strongGlow)">
    <text x="600" y="180" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="60" fill="url(#marioGradient)" font-weight="bold">
      GOWDAMAN P
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace" font-size="20" fill="#FFD700" filter="url(#glow)">
    🍄 Full-Stack Engineer 🍄
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- Animated Border -->
  <rect x="10" y="10" width="1180" height="380" rx="20" ry="20" fill="none" stroke="url(#marioGradient)" stroke-width="3" stroke-dasharray="10,5" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Corner Decorations -->
  <g transform="translate(30, 30)">
    <circle cx="0" cy="0" r="8" fill="#E52521" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(1170, 30)">
    <circle cx="0" cy="0" r="8" fill="#E52521" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
  <g transform="translate(30, 370)">
    <circle cx="0" cy="0" r="8" fill="#E52521" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>
  <g transform="translate(1170, 370)">
    <circle cx="0" cy="0" r="8" fill="#E52521" filter="url(#glow)">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Floating Particles -->
  <g opacity="0.4">
    <circle cx="300" cy="250" r="3" fill="#FF6B6B">
      <animate attributeName="cy" values="250;240;250" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="280" r="2" fill="#FFD700">
      <animate attributeName="cy" values="280;270;280" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="500" cy="320" r="2.5" fill="#FF6B6B">
      <animate attributeName="cy" values="320;310;320" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="700" cy="300" r="2" fill="#FFD700">
      <animate attributeName="cy" values="300;290;300" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.8s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>
  
  <!-- Bottom Wave -->
  <path d="M0,380 Q300,350 600,380 T1200,380 L1200,400 L0,400 Z" fill="#E52521" opacity="0.3">
    <animate attributeName="d" values="M0,380 Q300,350 600,380 T1200,380 L1200,400 L0,400 Z;M0,380 Q300,370 600,380 T1200,380 L1200,400 L0,400 Z;M0,380 Q300,350 600,380 T1200,380 L1200,400 L0,400 Z" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
